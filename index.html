<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Where to Watch — Streaming Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9f9f8;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.1);
      --border-md: rgba(0,0,0,0.18);
      --text: #111110;
      --text-muted: #6b6b68;
      --text-faint: #9e9e9b;
      --radius: 12px;
      --radius-sm: 8px;
      --radius-pill: 999px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #141413;
        --surface: #1e1e1c;
        --border: rgba(255,255,255,0.09);
        --border-md: rgba(255,255,255,0.16);
        --text: #f0efec;
        --text-muted: #9e9e9b;
        --text-faint: #6b6b68;
      }
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
      max-width: 480px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 1.25rem;
    }

    .logo i { font-size: 16px; }

    h1 {
      font-size: 32px;
      font-weight: 600;
      letter-spacing: -0.5px;
      line-height: 1.2;
      margin-bottom: 0.6rem;
    }

    .subtitle {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .search-box {
      width: 100%;
      max-width: 560px;
      margin-bottom: 2rem;
    }

    .search-row {
      display: flex;
      gap: 8px;
    }

    .search-row input {
      flex: 1;
      height: 46px;
      padding: 0 16px;
      font-size: 15px;
      font-family: inherit;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border-md);
      border-radius: var(--radius-sm);
      outline: none;
      transition: border-color 0.15s;
    }

    .search-row input:focus {
      border-color: #7F77DD;
      box-shadow: 0 0 0 3px rgba(127,119,221,0.15);
    }

    .search-row input::placeholder { color: var(--text-faint); }

    .search-row button {
      height: 46px;
      padding: 0 20px;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      background: #534AB7;
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
    }

    .search-row button:hover { background: #3C3489; }
    .search-row button:disabled { opacity: 0.5; cursor: not-allowed; }

    .legend {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 0.25rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .legend-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
    }

    #results {
      width: 100%;
      max-width: 560px;
    }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
    }

    .result-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 3px;
    }

    .result-meta {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    .services-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 1rem;
    }

    .pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: var(--radius-pill);
      border: 1px solid transparent;
    }

    .pill i { font-size: 13px; }

    .pill.free   { background: #E1F5EE; color: #085041; border-color: #5DCAA5; }
    .pill.sub    { background: #EEEDFE; color: #3C3489; border-color: #AFA9EC; }
    .pill.rent   { background: #FAEEDA; color: #633806; border-color: #EF9F27; }

    @media (prefers-color-scheme: dark) {
      .pill.free  { background: #04342C; color: #9FE1CB; border-color: #1D9E75; }
      .pill.sub   { background: #26215C; color: #CECBF6; border-color: #534AB7; }
      .pill.rent  { background: #412402; color: #FAC775; border-color: #BA7517; }
    }

    .result-note {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }

    .unavailable {
      font-size: 14px;
      color: var(--text-muted);
    }

    .loading {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-muted);
      font-size: 14px;
      padding: 1.5rem 0;
    }

    .dots { display: flex; gap: 5px; }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-faint);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,80%,100% { opacity: 0.25; } 40% { opacity: 1; } }

    .error-msg {
      font-size: 14px;
      color: #A32D2D;
      background: #FCEBEB;
      border: 1px solid #F09595;
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    @media (prefers-color-scheme: dark) {
      .error-msg { background: #501313; color: #F7C1C1; border-color: #A32D2D; }
    }

    footer {
      margin-top: 3rem;
      font-size: 12px;
      color: var(--text-faint);
      text-align: center;
      line-height: 1.8;
    }

    footer a { color: var(--text-faint); }

    @media (max-width: 500px) {
      h1 { font-size: 26px; }
      .search-row { flex-direction: column; }
      .search-row button { justify-content: center; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo"><i class="ti ti-device-tv"></i> Where to Watch</div>
    <h1>Find any movie or show</h1>
    <p class="subtitle">Search to see which streaming services carry it right now.</p>
  </header>

  <div class="search-box">
    <div class="search-row">
      <input type="text" id="query" placeholder="e.g. The Bear, Inception, Severance…" autocomplete="off" />
      <button id="search-btn"><i class="ti ti-search"></i> Search</button>
    </div>
  </div>

  <div id="results"></div>

  <footer>
    Powered by Claude AI &nbsp;·&nbsp; Availability reflects US streaming as of mid-2025<br />
    For real-time lookups visit <a href="https://www.justwatch.com" target="_blank">JustWatch.com</a>
  </footer>

  <script>
    const input = document.getElementById('query');
    const btn = document.getElementById('search-btn');
    const results = document.getElementById('results');

    function showLoading() {
      results.innerHTML = `<div class="loading"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>Searching streaming services…</div>`;
    }

    async function search() {
      const q = input.value.trim();
      if (!q) { input.focus(); return; }
      showLoading();
      btn.disabled = true;

      const prompt = `You are a streaming availability assistant. The user wants to know where to watch: "${q}"

Respond with ONLY a JSON object (no markdown, no backticks, no explanation). Use this exact structure:
{
  "title": "Official title",
  "year": "Release year or range e.g. 2019–2023",
  "type": "Movie or TV Series",
  "found": true,
  "services": [
    { "name": "Netflix", "type": "sub", "note": "All seasons" },
    { "name": "Tubi", "type": "free", "note": "Free with ads" },
    { "name": "Apple TV", "type": "rent", "note": "Rent $3.99 / Buy $14.99" }
  ],
  "summary": "One sentence about the show/movie and its current streaming status."
}

The "type" field for each service must be one of: "sub" (included with subscription), "free" (free with ads), "rent" (rent or buy only).
If you don't recognize the title or it doesn't exist, set "found": false and "services": [].
Only include real, currently active US streaming services as of mid-2025. Be accurate.`;

      try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            messages: [{ role: 'user', content: prompt }]
          })
        });

        const data = await res.json();
        const text = data.content.map(b => b.text || '').join('').replace(/```json|```/g, '').trim();
        const parsed = JSON.parse(text);
        render(parsed, q);
      } catch(e) {
        results.innerHTML = `<div class="error-msg"><i class="ti ti-alert-circle"></i> Something went wrong. Please try again.</div>`;
      }

      btn.disabled = false;
    }

    function render(d, q) {
      if (!d.found) {
        results.innerHTML = `<div class="result-card"><div class="result-title">No results for "${q}"</div><div class="result-meta" style="margin-bottom:0">Double-check the spelling or try an alternate title.</div></div>`;
        return;
      }

      const legendHTML = `<div style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:1rem;">
        <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted)"><div style="width:9px;height:9px;border-radius:50%;background:#5DCAA5"></div> Included with subscription</div>
        <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted)"><div style="width:9px;height:9px;border-radius:50%;background:#AFA9EC"></div> Subscription required</div>
        <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted)"><div style="width:9px;height:9px;border-radius:50%;background:#EF9F27"></div> Rent / buy</div>
      </div>`;

      const pills = d.services.length
        ? d.services.map(s => `<div class="pill ${s.type}"><i class="ti ti-device-tv"></i>${s.name}${s.note ? ' — ' + s.note : ''}</div>`).join('')
        : `<p class="unavailable">Not currently available on major US streaming platforms.</p>`;

      results.innerHTML = `
        ${legendHTML}
        <div class="result-card">
          <div class="result-title">${d.title}</div>
          <div class="result-meta">${d.type}${d.year ? ' · ' + d.year : ''}</div>
          <div class="services-grid">${pills}</div>
          ${d.summary ? `<div class="result-note">${d.summary}</div>` : ''}
        </div>`;
    }

    btn.addEventListener('click', search);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') search(); });
    input.focus();
  </script>
</body>
</html>
